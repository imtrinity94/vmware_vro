name: Generate JSDoc and Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  # Opt into Node.js 24 across all actions to avoid Node.js 20 deprecation warnings
  # See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy-docs:
    name: Build JSDoc HTML and publish to GitHub Pages
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node setup ──────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      # ── 3. Install JSDoc + docdash theme ───────────────────────────────────
      - name: Install dependencies
        run: npm install

      # ── 4. Generate Portal Metadata + Assets ──────────────────────────────
      - name: Build custom documentation portal
        run: npm run build:docs

      # ── 5. Verify dist/ output ─────────────────────────────────────────────
      - name: Verify dist/ output
        run: |
          echo "=== Generated artifacts ==="
          ls -R dist/
          echo "Portal is ready for deployment."

      # ── 6. Add .nojekyll so GitHub Pages serves all files as-is ────────────
      - name: Add .nojekyll
        run: touch dist/.nojekyll

      # ── 7. Deploy to GitHub Pages (gh-pages branch) ────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          commit_message: "docs: update actions portal [skip ci]"
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
