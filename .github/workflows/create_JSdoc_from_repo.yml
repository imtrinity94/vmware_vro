name: Generate JSDoc and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy-docs:
    name: Build JSDoc HTML and publish to GitHub Pages
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node setup ──────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── 3. Install JSDoc + docdash theme ───────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Generate JSDoc HTML from Actions/ ───────────────────────────────
      - name: Generate JSDoc site
        run: npm run docs

      # ── 5. Verify output was created ───────────────────────────────────────
      - name: Verify docs/ output
        run: |
          echo "=== Generated files ==="
          find docs/ -name "*.html" | head -30
          echo "Total HTML files: $(find docs/ -name '*.html' | wc -l)"

      # ── 6. Add a .nojekyll so GitHub Pages serves ALL files ────────────────
      - name: Add .nojekyll
        run: touch docs/.nojekyll

      # ── 7. Deploy to GitHub Pages (gh-pages branch) ────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          commit_message: "docs: regenerate JSDoc [skip ci]"
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
